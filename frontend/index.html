<!DOCTYPE html>
<html>
<head>
    <title>Geo Data Platform</title>
</head>
<body>
    <h2>Geo Data Download Platform</h2>
    <form action="http://127.0.0.1:8000/download" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required><br><br>

        <select name="collection">
            <option value="sentinel-2-l2a">Sentinel-2</option>
            <option value="landsat-c2-l2">Landsat</option>
            <option value="sentinel-1-grd">Sentinel-1</option>
        </select><br><br>

        <input type="text" name="date_range" placeholder="2025-01-01/2025-01-31"><br><br>
        <input type="number" name="cloud" placeholder="Cloud %"><br><br>

        <button type="submit">Download</button>
    </form>
</body>
</html>
